apiVersion: v1
kind: Service
metadata:
  name: {{ include "xboard.componentName" (dict "ctx" . "role" "web") }}
  labels:
    {{- include "xboard.componentLabels" (dict "ctx" . "role" "web") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    {{- include "xboard.selectorLabels" (dict "ctx" . "role" "web") | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.containerPortName }}
      name: {{ .Values.web.service.portName }}
