{{- if .Values.ingress.redirectHttpToHttps }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.ingress.routes.webRedirect.name }}
  labels:
    {{- include "xboard.componentLabels" (dict "ctx" . "role" "web") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.ingress.parentRefs.http | nindent 4 }}
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  rules:
    - matches:
        - path:
            type: {{ .Values.ingress.routes.webRedirect.pathType }}
            value: {{ .Values.ingress.routes.webRedirect.pathValue | quote }}
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: {{ .Values.ingress.routes.webRedirect.statusCode | default 301 }}
{{- end }}
