apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xboard.componentName" (dict "ctx" . "role" "web") }}
  labels:
    {{- include "xboard.componentLabels" (dict "ctx" . "role" "web") | nindent 4 }}
  annotations:
    {{- if .Values.reloader.enabled }}
    secret.reloader.stakater.com/reload: {{ include "xboard.configSecretName" . | quote }}
    {{- end }}
    checksum/config: {{ include "xboard.configChecksum" . | quote }}
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.web.hpa.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "xboard.selectorLabels" (dict "ctx" . "role" "web") | nindent 6 }}
  strategy:
    {{- toYaml .Values.web.strategy | nindent 4 }}
  revisionHistoryLimit: {{ .Values.web.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        {{- include "xboard.componentLabels" (dict "ctx" . "role" "web") | nindent 8 }}
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.web.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "xboard.image" (dict "ctx" . "role" "web") }}
          imagePullPolicy: {{ include "xboard.imagePullPolicy" (dict "ctx" . "role" "web") }}
          ports:
            - name: {{ .Values.web.containerPortName }}
              containerPort: {{ .Values.web.containerPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "xboard.configSecretName" . }}
          env:
            - name: docker
              value: "true"
            {{- include "xboard.disabledFlagsEnv" (dict "ctx" . "flags" .Values.web.disabledFlags) | nindent 12 }}
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.web.probes.startup | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.web.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.web.probes.readiness | nindent 12 }}
