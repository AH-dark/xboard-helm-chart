{{- if .Values.horizon.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "xboard.componentName" (dict "ctx" . "role" "horizon") }}
  labels:
    {{- include "xboard.componentLabels" (dict "ctx" . "role" "horizon") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "xboard.componentName" (dict "ctx" . "role" "horizon") }}
  minReplicas: {{ .Values.horizon.hpa.minReplicas }}
  maxReplicas: {{ .Values.horizon.hpa.maxReplicas }}
  metrics:
    {{- toYaml .Values.horizon.hpa.metrics | nindent 4 }}
{{- end }}
